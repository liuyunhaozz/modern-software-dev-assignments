<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Action Item Extractor</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif; margin: 2rem auto; max-width: 800px; padding: 0 1rem; }
      h1 { font-size: 1.5rem; }
      textarea { width: 100%; min-height: 160px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace; }
      button { padding: 0.5rem 1rem; }
      .items { margin-top: 1rem; }
      .item { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0; }
      .muted { color: #6b7280; font-size: 0.875rem; }
      .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
      .note-card { border: 1px solid #e5e7eb; border-radius: 6px; padding: 0.75rem; margin-top: 0.5rem; }
      .note-card pre { white-space: pre-wrap; margin: 0.25rem 0 0; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.875rem; }
    </style>
  </head>
  <body>
    <h1>Action Item Extractor</h1>
    <p class="muted">Paste notes and extract actionable items. Minimal raw HTML frontend.</p>

    <label for="text">Notes</label>
    <textarea id="text" placeholder="Paste notes here...&#10;e.g.&#10;- [ ] Set up database&#10;- Implement extract endpoint"></textarea>
    <div class="row">
      <label class="row"><input id="save_note" type="checkbox" checked /> Save as note</label>
      <button id="extract">Extract</button>
      <!-- TODO 4: triggers LLM-powered extraction via /action-items/extract-llm -->
      <button id="extract-llm">Extract LLM</button>
      <!-- TODO 4: fetches all persisted notes via /notes -->
      <button id="list-notes">List Notes</button>
    </div>

    <div class="items" id="items"></div>
    <!-- TODO 4: container populated by the "List Notes" handler -->
    <div class="items" id="notes"></div>

    <script>
      const $ = (sel) => document.querySelector(sel);
      const itemsEl = $('#items');
      const notesEl = $('#notes');

      // Escape user-provided text before injecting into innerHTML.
      const escape = (s) => String(s).replace(/[&<>"']/g, c => (
        { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
      ));

      // Shared handler used by both Extract buttons. `endpoint` is the
      // backend route to POST against — heuristic vs. LLM.
      async function runExtraction(endpoint, label) {
        const text = $('#text').value;
        const save = $('#save_note').checked;
        notesEl.innerHTML = '';
        itemsEl.textContent = `Extracting via ${label}...`;
        try {
          const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, save_note: save }),
          });
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.detail || 'Request failed');
          }
          const data = await res.json();
          if (!data.items || data.items.length === 0) {
            itemsEl.innerHTML = '<p class="muted">No action items found.</p>';
            return;
          }
          itemsEl.innerHTML = data.items.map(it => (
            `<div class="item"><input type="checkbox" data-id="${it.id}" /> <span>${escape(it.text)}</span></div>`
          )).join('');
          itemsEl.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', async (e) => {
              const id = e.target.getAttribute('data-id');
              await fetch(`/action-items/${id}/done`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ done: e.target.checked }),
              });
            });
          });
        } catch (err) {
          console.error(err);
          itemsEl.textContent = `Error: ${err.message}`;
        }
      }

      $('#extract').addEventListener('click',
        () => runExtraction('/action-items/extract', 'heuristics'));

      // TODO 4: LLM extraction button — hits the new /action-items/extract-llm
      // endpoint which uses Ollama instead of the regex heuristics.
      $('#extract-llm').addEventListener('click',
        () => runExtraction('/action-items/extract-llm', 'LLM'));

      // TODO 4: List Notes button — fetches every saved note from /notes
      // and renders them below the action items.
      $('#list-notes').addEventListener('click', async () => {
        itemsEl.innerHTML = '';
        notesEl.textContent = 'Loading notes...';
        try {
          const res = await fetch('/notes');
          if (!res.ok) throw new Error('Request failed');
          const notes = await res.json();
          if (!notes.length) {
            notesEl.innerHTML = '<p class="muted">No saved notes yet.</p>';
            return;
          }
          notesEl.innerHTML = notes.map(n => (
            `<div class="note-card">
               <div class="muted">Note #${n.id} &middot; ${escape(n.created_at || '')}</div>
               <pre>${escape(n.content)}</pre>
             </div>`
          )).join('');
        } catch (err) {
          console.error(err);
          notesEl.textContent = `Error loading notes: ${err.message}`;
        }
      });
    </script>
  </body>
  </html>
